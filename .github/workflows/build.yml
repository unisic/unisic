name: Build

# PR smoke check: does the AppImage still build? The AppImage is the fragile
# package (bundled Qt wayland stack, source-built layer-shell-qt + zxing via
# linuxdeploy), so it's the one worth catching before merge. It reuses the exact
# build release.yml publishes, so a green PR means a buildable release AppImage.
#
# It replaces the old Fedora compile+ctest job (that ran on every push): the
# Fedora compile is still exercised at release time by release.yml's rpm job.
# Only runs on pull requests (and on demand) — the AppImage build is heavy, so
# it should not fire on every commit push.
on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

# A new push to the PR branch cancels the still-running check of the previous
# commit — only the newest commit's result matters.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appimage:
    name: AppImage build check
    uses: ./.github/workflows/appimage.yml
