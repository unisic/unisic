name: Release Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  BUILD_TYPE: Release
  # Baked into the binary by CMake and shown in the sidebar footer.
  UNISIC_BUILD_NUMBER: ${{ github.run_number }}

jobs:
  check:
    name: Version check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - id: v
        name: Read version and decide whether to release
        run: |
          # Display version (allows pre-release suffixes like "0.3b"); falls
          # back to the numeric project() version if the string is absent.
          version_line="$(grep -m1 '^set(UNISIC_VERSION_STRING' CMakeLists.txt || true)"
          if [[ -n "$version_line" ]]; then
            version="$(sed -E 's/.*"([^"]+)".*/\1/' <<<"$version_line")"
          else
            version_line="$(grep -m1 '^project(unisic VERSION' CMakeLists.txt)"
            version="${version_line#*VERSION }"
            version="${version%% *}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # Release only when this version has not been tagged yet — i.e. the
          # version in CMakeLists.txt was bumped. Plain pushes to main (docs,
          # refactors without a bump) build nothing and cut no release.
          if git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${version} already exists — no version bump, skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Releasing v${version}."
          fi

  deb:
    name: Debian package
    needs: check
    if: ${{ needs.check.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    container: debian:trixie
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          # tesseract/leptonica and LayerShellQt are OPTIONAL compile-time deps
          # (HAVE_TESSERACT / HAVE_LAYERSHELL) — without the -dev packages here
          # the shipped binary has OCR and the on-top layer-shell surfaces
          # (custom notification card, overlay-over-fullscreen, preview pin)
          # compiled out no matter what the user installs at runtime.
          apt-get install -y --no-install-recommends \
            ca-certificates git cmake ninja-build g++ pkg-config dpkg-dev file \
            qt6-base-dev qt6-declarative-dev qt6-svg-dev qt6-wayland \
            qt6-tools-dev qt6-l10n-tools \
            libpipewire-0.3-dev \
            libtesseract-dev libleptonica-dev libzxing-dev \
            liblayershellqtinterface-dev libwayland-dev libkf6guiaddons-dev

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build DEB
        run: |
          cmake -B build-deb -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCPACK_GENERATOR=DEB
          cmake --build build-deb --parallel
          cpack --config build-deb/CPackConfig.cmake -G DEB -B dist
          dpkg-deb --field dist/*.deb Depends Recommends
          apt-get install -y --no-install-recommends ./dist/*.deb

      - uses: actions/upload-artifact@v4
        with:
          name: unisic-deb
          path: dist/*.deb
          if-no-files-found: error

  # The rpm asset is FEDORA-ONLY, deliberately: QML type registration links
  # Qt PRIVATE API symbols (QQmlPrivate via qt_add_qml_module), so a binary
  # rpm hard-requires the EXACT Qt minor it was built against —
  # libQt6Qml.so.6(Qt_6.11_PRIVATE_API) from fedora:latest can never resolve
  # on openSUSE's Qt, and one rpm across distros is impossible by
  # construction. openSUSE ships from the OBS repos instead (TW + Leap 16,
  # auto-rebuilt when TW's dependencies move — see packaging/obs/README.md);
  # a COPR suse lane was tried (2026-07) and reverted after COPR's Pulp
  # storage migration broke the opensuse chroots at mock-bootstrap time.
  rpm:
    name: RPM (Fedora)
    needs: check
    if: ${{ needs.check.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install build dependencies
        run: |
          # tesseract/leptonica and layer-shell-qt are OPTIONAL compile-time
          # deps (HAVE_TESSERACT / HAVE_LAYERSHELL) — see the deb job comment.
          dnf install -y \
            ca-certificates git cmake ninja-build gcc-c++ pkgconf-pkg-config rpm-build file \
            qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qtsvg-devel qt6-qtwayland \
            qt6-qttools-devel \
            pipewire-devel \
            tesseract-devel leptonica-devel zxing-cpp-devel \
            layer-shell-qt-devel wayland-devel

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build RPM
        run: |
          cmake -B build-rpm -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCPACK_GENERATOR=RPM
          cmake --build build-rpm --parallel
          cpack --config build-rpm/CPackConfig.cmake -G RPM -B dist
          # Install gate: resolves the runtime Requires against Fedora repos
          # and runs the COPR %post (self-registration) in the container.
          dnf install -y ./dist/*.rpm
          test -e /etc/yum.repos.d/unisic-copr.repo
          for f in dist/*.x86_64.rpm; do
            mv "$f" "${f%.x86_64.rpm}.fedora.x86_64.rpm"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: unisic-rpm-fedora
          path: dist/*.rpm
          if-no-files-found: error

  arch:
    name: Arch package
    needs: check
    if: ${{ needs.check.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm --needed \
            ca-certificates git base-devel cmake ninja pkgconf \
            qt6-base qt6-declarative qt6-svg qt6-wayland qt6-tools \
            pipewire ffmpeg wl-clipboard xdg-desktop-portal \
            tesseract leptonica layer-shell-qt wayland zxing-cpp \
            kguiaddons

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Arch package
        run: |
          version_line=""
          while IFS= read -r line; do
            if [[ "$line" == project\(unisic\ VERSION* ]]; then
              version_line="$line"
              break
            fi
          done < CMakeLists.txt
          if [[ -z "$version_line" ]]; then
            printf 'Could not read project version from CMakeLists.txt\n' >&2
            exit 1
          fi
          version="${version_line#*VERSION }"
          version="${version%% *}"
          # git archive skips submodules — archive the superproject and the
          # kit separately, concatenate the (uncompressed) tars, then gzip.
          git -c safe.directory="$GITHUB_WORKSPACE" archive --format=tar --prefix="unisic-${version}/" -o /tmp/unisic-src.tar HEAD
          git -C external/unisic-kit -c safe.directory="$GITHUB_WORKSPACE/external/unisic-kit" archive --format=tar --prefix="unisic-${version}/external/unisic-kit/" -o /tmp/unisic-kit-src.tar HEAD
          tar --concatenate --file=/tmp/unisic-src.tar /tmp/unisic-kit-src.tar
          gzip -c /tmp/unisic-src.tar > "packaging/arch/unisic-${version}.tar.gz"
          # PKGBUILD carries a literal pkgver (OBS's server-side parser can't
          # expand ${var:-default}); inject the CMakeLists version here.
          sed -i "s/^pkgver=.*/pkgver=${version}/" packaging/arch/PKGBUILD
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser -u builder -- bash -lc "cd '$GITHUB_WORKSPACE/packaging/arch' && makepkg --noconfirm --clean --cleanbuild"
          mkdir -p dist
          cp packaging/arch/*.pkg.tar.zst dist/
          # Install gate: runs unisic.install's post_install in the container.
          # Either outcome is valid — repo added (container keyring is
          # populated, so the key import should succeed) or the printed
          # fallback (uninitialized keyring). INVALID is the half-state:
          # repo entry present without the trusted key.
          pacman -U --noconfirm dist/*.pkg.tar.zst
          if grep -q 'home_unisic_Arch' /etc/pacman.conf; then
            pacman-key --list-keys E5057FCB0F3DF876 >/dev/null
            pacman -Sy   # the registered OBS repo must actually resolve
          else
            echo "post_install took the manual-instructions fallback (no repo entry) — OK"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: unisic-arch
          path: dist/*.pkg.tar.zst
          if-no-files-found: error

  appimage:
    name: AppImage
    needs: check
    if: ${{ needs.check.outputs.should_release == 'true' }}
    # Extracted to a reusable workflow so build.yml's PR smoke check runs the
    # identical build (no drift). Uploads the unisic-appimage artifact the
    # release job downloads below.
    uses: ./.github/workflows/appimage.yml

  release:
    name: GitHub Release
    needs:
      - check
      - deb
      - rpm
      - arch
      - appimage
    if: ${{ needs.check.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the changelog can diff against the previous
          # release and find the last clean semver tag.
          fetch-depth: 0
          submodules: recursive

      # Every package is attached to the GitHub release. The repos stay the
      # UPDATE channel — each direct-download package self-registers its native
      # repo on first install, so a one-off download keeps updating natively:
      #   .deb      → OBS apt repo   (packaging/deb/postinst)
      #   .rpm      → Fedora-only asset (.fedora — see the rpm job comment);
      #               %post registers the COPR dnf repo. openSUSE has no
      #               release rpm: it installs from the OBS repos (README)
      #   .pkg.tar.zst → OBS pacman repo (packaging/arch/unisic.install)
      #   AppImage  → self-updates via the embedded zsync info
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        run: bash scripts/gen-changelog.sh "$VERSION" > NOTES.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s globstar nullglob
          assets=()
          for path in dist/**/*; do
            [[ -f "$path" ]] && assets+=("$path")
          done
          if [[ ${#assets[@]} -eq 0 ]]; then
            printf 'No release assets found\n' >&2
            exit 1
          fi

          # A letter suffix in the version ("0.3b", "1.0rc1") marks the
          # GitHub release as a pre-release automatically.
          prerelease=()
          if [[ "$VERSION" =~ [a-zA-Z] ]]; then
            prerelease=(--prerelease)
          fi
          gh release create "v${VERSION}" "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "Unisic ${VERSION}" \
            --notes-file NOTES.md "${prerelease[@]}"

  obs:
    name: Trigger OBS rebuild
    # needs `release` so the v<version> tag exists when OBS's obs_scm service
    # fetches the repo; `check` only for the should_release output. The OBS
    # project (home:unisic) rebuilds Debian/Ubuntu/Arch/openSUSE
    # repos from the tag — see packaging/obs/README.md.
    needs:
      - check
      - release
    if: ${{ needs.check.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Run OBS source services (home:unisic/unisic)
        env:
          OBS_TOKEN: ${{ secrets.OBS_TOKEN }}
        run: |
          if [[ -z "$OBS_TOKEN" ]]; then
            echo "::error::OBS_TOKEN secret is not configured (see packaging/obs/README.md)"
            exit 1
          fi
          resp="$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Token ${OBS_TOKEN}" \
            "https://api.opensuse.org/trigger/runservice?project=home:unisic&package=unisic")"
          echo "$resp"
          grep -q 'code="ok"' <<<"$resp" \
            || { echo "::error::OBS trigger did not return ok"; exit 1; }
